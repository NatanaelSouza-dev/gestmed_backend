services:
  db:
    image: postgres:16-alpine
    container_name: gestmed_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestmed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestmed}
      POSTGRES_DB: ${POSTGRES_DB:-gestmed_exams}
    ports:
      - "${DB_BIND_ADDRESS:-0.0.0.0}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestmed} -d ${POSTGRES_DB:-gestmed_exams}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: gestmed_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestmed}:${POSTGRES_PASSWORD:-gestmed}@db:5432/${POSTGRES_DB:-gestmed_exams}
      PORT: ${PORT:-3333}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      MAGIC_LINK_BASE_URL: ${MAGIC_LINK_BASE_URL}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      PATIENT_ACCESS_URL: ${PATIENT_ACCESS_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    ports:
      - "${API_BIND_ADDRESS:-0.0.0.0}:${PORT:-3333}:3333"
    restart: unless-stopped

volumes:
  postgres_data:
